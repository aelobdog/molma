name: Build and Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            output: molma
          - os: windows-latest
            output: molma.exe

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Setup Odin
      # -----------------------------
      - name: Setup Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: "dev-2026-05" 

      # -----------------------------
      # Build project
      # -----------------------------
      - name: Build project
        shell: bash
        run: |
          mkdir -p build
          odin build . -o:speed -out:build/${{ matrix.output }}

      # -----------------------------
      # Upload Artifacts (Internal)
      # -----------------------------
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ runner.os }}
          path: build/

      # -----------------------------
      # Create GitHub Release (Public)
      # -----------------------------
      - name: Release
        uses: softprops/action-gh-release@v2
        # Only run this step if we pushed a tag (e.g., v1.0.0)
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/${{ matrix.output }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
