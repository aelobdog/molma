name: Build and Release

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            output: molma
            artifact_name: molma-linux.tar.gz
          - os: windows-latest
            output: molma.exe
            artifact_name: molma-windows.zip

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Setup Odin
      # -----------------------------
      - name: Setup Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: "dev-2026-05" 

      # -----------------------------
      # Build project
      # -----------------------------
      - name: Build project
        shell: bash
        run: |
          mkdir -p dist
          odin build . -o:speed -out:dist/${{ matrix.output }}
          
          # Copy your 'fonts' folder specifically
          if [ -d "fonts" ]; then
            cp -r fonts dist/
          fi

      # -----------------------------
      # Package Assets
      # -----------------------------
      - name: Package Assets
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            # Bundle the .exe and the fonts folder together
            7z a ${{ matrix.artifact_name }} ./dist/*
          else
            # Bundle the binary and fonts folder for Linux
            tar -cvzf ${{ matrix.artifact_name }} -C dist .
          fi

      # -----------------------------
      # Upload Artifacts (Internal)
      # -----------------------------
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

      # -----------------------------
      # Create GitHub Release (Public)
      # -----------------------------
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
